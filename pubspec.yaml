name: sk_pqc
description: >-
  Hybrid post-quantum key encapsulation (X25519 + ML-KEM-768, FIPS 203) for
  Dart and Flutter across web and native. Binds audited primitives (liboqs,
  noble-post-quantum) with a standard HKDF-SHA256 hybrid combiner. KEM-only.
version: 0.1.0
repository: https://github.com/smilinTux/sk-pqc-dart
issue_tracker: https://github.com/smilinTux/sk-pqc-dart/issues
# pub.dev allows at most 5 topics; chosen for AI/human search-discoverability.
topics:
  - post-quantum
  - cryptography
  - mlkem
  - hybrid
  - flutter

environment:
  sdk: ^3.5.0

dependencies:
  cryptography: ^2.7.0
  ffi: ^2.1.0
  web: ^1.0.0
  # Runtime for the OPTIONAL flutter_rust_bridge binding to the sk-pqc-rs core
  # (lib/src/rust/, generated from sk-pqc-rs built `--features dart`). Pinned to
  # the codegen version. The pure-Dart KEM + ratchet path does NOT need this — it
  # backs only the Rust-core-over-FFI parity binding (see README "Rust core via
  # FFI"). `flutter_rust_bridge` runs in pure Dart (no Flutter SDK required).
  flutter_rust_bridge: 2.12.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
